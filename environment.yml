name: b
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.10
  - pip
  - numpy
  - opencv
  - matplotlib
  - pytest
  - pip:
      - build>=1.0
      - smbus2>=0.4
      - pymp-pypi>=0.5
      - onnxruntime>=1.16
      # RKNN runtime is board/vendor-specific. Install Rockchip's
      # rknn-toolkit-lite2 wheel separately on the RK3588 board when using
      # the RKNN detector.
